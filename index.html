<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stlyes.css" />
    <link rel="shortcut icon" href="./images/favicon.png" type="image/png">
    <title>Chat Lua</title>
  </head>
  <body class="dark-mode">
    <header>
        <img src="icon.png" alt="">
        <h1>CHAT LUA</h1>
    </header>
    <main>
      <div class="chat_container">
        <section class="chat_header">
          <section class="chat_header_info">
            <img src="./images/favicon.png" alt="Ícone do chatbot" class="avatar" />
            <span class="chat_nome">Chat Lua</span>
            <button type="button" class="mode-btn" onclick="lightDark()">
              <span class="sun">☀</span>
              <span class="moon">☽</span>
            </button>
          </section>
          <button type="button" class="clear-btn" onclick="clearChat()">
            Apagar Histórico
          </button>
        </section>

        <section class="chat_mensagem" id="chat_mensagem" aria-live="polite">
          <article class="mensagem bot">
            <div class="bubble">
              <p>Olá! Sou seu assistente virtual Em que posso te ajudar?</p>
              <time class="yours-chat" datetime=""></time>
              <button class="copy-btn" id="0" onclick="copyMessage(0)">
                <img src="./images/copy-outline.svg" alt="copy">
              </button>
            </div>
          </article>

        </section>
 
        <section class="chat_input">
          <form action="" id="chat_form">
            <input
              type="text"
              id="msgInput"
              placeholder="Digite sua mensagem..."
              autocomplete="off"
              required
            />
            <button type="submit" aria-label="Enviar mensagem">➤</button>
          </form>
        </section>
      </div>
    </main>
    <footer>
      <div>
        <p>&copy; Determinados do grupo 15 - 2025</p>
      </div>
    </footer>
    <script src="./script.js"></script>
  </body>
</html>
