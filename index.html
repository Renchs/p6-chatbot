<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="stlyes.css" />
    <title>Chat Lua</title>
  </head>
  <body class="dark-mode">
    <header>
        <img src="icon.png" alt="">
        <h1>CHAT LUA</h1>
    </header>
    <main>
      <div class="chat_container">
        <section class="chat_header">
          <img src="favicon.png" alt="Ícone do chatbot" class="avatar" />
          <span class="chat_nome">Chat Lua</span>
          <button type="button" class="mode-btn" onclick="lightDark()">
            <span class="sun">☀</span>
            <span class="moon">☽</span>
          </button>
        </section>

        <section class="chat_mensagem" id="chat_mensagem" aria-live="polite">
          <article class="mensagem bot">
            <div class="bubble">
              <p>Olá! Sou seu assistente virtual.</p>
              <time datetime="2025-08-09T20:10">20:10</time>
            </div>
          </article>

          <article class="mensagem user">
            <div class="bubble">
              <p>Oi, tudo bem?</p>
              <time datetime="2025-08-09T20:11">20:11</time>
            </div>
          </article>
        </section>

        <section class="chat_input">
          <form action="" id="chat_form">
            <input
              type="text"
              id="msgInput"
              placeholder="Digite sua mensagem..."
              autocomplete="off"
              required
            />
            <button type="submit" aria-label="Enviar mensagem">➤</button>
          </form>
        </section>
      </div>
    </main>
    <footer>
      <div>
        <p>&copy; Determinados do grupo 15 - 2025</p>
      </div>
    </footer>
    <script>
      function lightDark() {
        let element = document.body;
        element.classList == "light-mode" ? element.classList.replace("light-mode","dark-mode") : element.classList.replace("dark-mode" ,"light-mode");
      };
    </script>
  </body>
</html>
